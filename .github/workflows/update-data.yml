name: Update Training Data

on:
  schedule:
    # Ejecuta todos los días a las 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Permite ejecución manual

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch data from Notion
        run: npm run fetch-data
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if git diff --quiet docs/data.json; then
            echo "No changes in data.json"
          else
            git add docs/data.json
            git commit -m "chore: update training data from Notion"
            git push
          fi
