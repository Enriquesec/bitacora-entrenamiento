name: Update Training Data

on:
  schedule:
    # Ejecuta todos los días a las 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Permite ejecución manual

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch data from Notion
        run: npm run fetch-data
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if git diff --quiet docs/data.json; then
            echo "No changes in data.json"
          else
            git add docs/data.json
            git commit -m "chore: update training data from Notion"
            git push
          fi

      - name: Setup Python (backup)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backup dependencies
        run: pip install -r scripts/requirements-backup.txt

      - name: Backup Notion → Google Drive
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          if [ -z "$GOOGLE_CREDENTIALS" ] || [ -z "$GOOGLE_DRIVE_FOLDER_ID" ]; then
            echo "⚠️  Secrets GOOGLE_CREDENTIALS / GOOGLE_DRIVE_FOLDER_ID no configurados — omitiendo backup"
            exit 0
          fi
          python scripts/backup_notion.py
